<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Questy">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Rozlučka Dubrovník</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
    --text: #f0ede8; --muted: #666; --accent: #f0ede8;
    --easy: #6b9e6b; --medium: #c4962a; --hard: #c45a2a; --final: #8b6fcb;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  #app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 12px; border-bottom: 1px solid var(--border); }
  #topbar .location { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  #counter { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.1em; color: var(--muted); }
  #slider-wrap { flex: 1; overflow: hidden; position: relative; }
  #slider { display: flex; height: 100%; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .slide { min-width: 100%; height: 100%; overflow-y: auto; padding: 24px 20px 40px; -webkit-overflow-scrolling: touch; }
  .quest-num { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .quest-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
  .quest-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1.0; letter-spacing: 0.02em; flex: 1; }
  .diff-badge { flex-shrink: 0; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; margin-top: 6px; }
  .diff-easy   { background: rgba(107,158,107,0.15); color: var(--easy);   border: 1px solid rgba(107,158,107,0.3); }
  .diff-medium { background: rgba(196,150,42,0.15);  color: var(--medium); border: 1px solid rgba(196,150,42,0.3); }
  .diff-hard   { background: rgba(196,90,42,0.15);   color: var(--hard);   border: 1px solid rgba(196,90,42,0.3); }
  .diff-final  { background: rgba(139,111,203,0.15); color: var(--final);  border: 1px solid rgba(139,111,203,0.3); }
  .result-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .result-btn { flex: 1; padding: 10px 0; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .result-btn.active-done { background: rgba(107,158,107,0.15); border-color: var(--easy);   color: var(--easy); }
  .result-btn.active-fail { background: rgba(196,90,42,0.15);   border-color: var(--hard);   color: var(--hard); }
  .sect-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 20px; }
  .quest-desc { font-size: 15px; line-height: 1.65; color: #bbb; margin-bottom: 4px; }
  .goals-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .goal-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .goal-item:last-child { border-bottom: none; }
  .goal-check { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .goal-item.checked .goal-check { background: var(--easy); border-color: var(--easy); }
  .goal-item.checked .goal-check::after { content: ''; width: 5px; height: 9px; border-right: 2px solid #0a0a0a; border-bottom: 2px solid #0a0a0a; transform: rotate(45deg) translate(-1px,-1px); display: block; }
  .goal-item.checked .goal-text { color: var(--muted); text-decoration: line-through; text-decoration-color: #444; }
  .goal-text { font-size: 14px; line-height: 1.5; color: var(--text); transition: color 0.15s; }
  .rp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .rp-box { border-radius: 4px; padding: 12px; border: 1px solid var(--border); }
  .rp-box.reward  { border-color: rgba(107,158,107,0.3); background: rgba(107,158,107,0.06); }
  .rp-box.penalty { border-color: rgba(196,90,42,0.3);   background: rgba(196,90,42,0.06); }
  .rp-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .rp-box.reward  .rp-label { color: var(--easy); }
  .rp-box.penalty .rp-label { color: var(--hard); }
  .rp-text { font-size: 13px; line-height: 1.5; color: #aaa; }
  #bottomnav { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--bg); }
  .nav-btn { width: 44px; height: 44px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s; }
  .nav-btn:active { background: var(--surface); }
  .nav-btn:disabled { opacity: 0.2; pointer-events: none; }
  #dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 200px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.2s; cursor: pointer; }
  .dot.active { background: var(--text); transform: scale(1.3); }
  .dot.done   { background: var(--easy); }
  .dot.failed { background: var(--hard); }
  #hint { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-size: 12px; color: var(--muted); pointer-events: none; opacity: 1; transition: opacity 0.5s; white-space: nowrap; z-index: 100; }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="location">⚔ Rozlučka · Dubrovník</span>
    <span id="counter"></span>
  </div>
  <div id="slider-wrap">
    <div id="slider"></div>
  </div>
  <div id="bottomnav">
    <button class="nav-btn" id="btn-prev">←</button>
    <div id="dots"></div>
    <button class="nav-btn" id="btn-next">→</button>
  </div>
</div>
<div id="hint">← přejeď prstem →</div>

<script>
const QUESTS = [
  {
    num: 1, title: "Víno s cizincem", diff: "snadný",
    desc: "Ženich musí navázat rozhovor s náhodným cizincem v baru, říct mu že slaví rozlučku, a vypít s ním jedno pivo. Musí zjistit aspoň tři věci: jméno, odkud je a proč je v Dubrovníku.",
    goals: [
      "Přijít za cizincem sám od sebe — parta ho nesmí nasměrovat",
      "Dovědět se jméno, zemi původu a důvod návštěvy",
      "Společné foto s cizincem jako důkaz",
    ],
    reward: "Ženich neplatí po zbytek večera za sebe drinky.",
    penalty: "Platí kolo pro celou partu.",
  },
  {
    num: 2, title: "Strážce hradeb", diff: "snadný",
    desc: "Na starém městě musí ženich najít nejstarší viditelný nápis nebo znak na zdi, vyfotit ho a před celou partou improvizovat 120 vteřin o jeho \"historii\" — smyšlené i pravdivé detaily jsou povoleny.",
    goals: [
      "Najít a zdokumentovat historický nápis nebo erb",
      "Vydržet mluvit bez přestávky celých 120 sekund",
      "Nadpoloviční většina party palcem nahoru = splněno",
    ],
    reward: "Ženich si vybírá restauraci a neplatí — zve ho skupina.",
    penalty: "Nosí turistický kýč po zbytek dne (sandále v ponožkách, triko \"I ❤ Dubrovnik\", ledvinka apod.).",
  },
  {
    num: 3, title: "Turistický průvodce", diff: "snadný",
    desc: "Ženich musí přistoupit k turistické skupině nebo rodině a nabídnout se jako bezplatný fotograf. Musí nafotit aspoň pět fotek, všechny jim ukázat a popsat historii místa (smyšleně, nebo pravdivě).",
    goals: [
      "Skupina musí mít aspoň 3 lidi",
      "Nafotit aspoň 5 fotek a ukázat je turistům na displeji",
      "Přednést historii o místě",
    ],
    reward: "Ženich si vybere jednoho člena party, který ho musí po zbytek dne oslovovat výhradně „pane průvodce".",
    penalty: "Při příští zastávce musí ženich požádat obsluhu o doporučení na nejlepší místní specialitu a bez odmlouvání si ji objednat.",
  },
  {
    num: 4, title: "Pouliční zpěvák", diff: "střední",
    desc: "Ženich musí zastavit náhodného chodce, říct mu že slaví rozlučku, a požádat ho aby mu zazpíval nebo zahvízdal jakoukoli píseň. Cizinec musí skutečně zpívat — ne jen broukat.",
    goals: [
      "Cizinec zpívá nebo hvízdá sám od sebe, aspoň 10 sekund",
      "Ženich mu po skončení zatleská a poděkuje česky",
      "Video jako důkaz — celé zachyceno na kameru",
    ],
    reward: "Vybírá příští zastávku na večer a neplatí alkohol.",
    penalty: "Musí sám zazpívat nahlas na ulici před celou partou.",
  },
  {
    num: 5, title: "Milostný dopis", diff: "střední",
    desc: "Ženich musí přesvědčit náhodného cizince, aby namluvil nebo napsal krátký vzkaz nevěstě — jako by ji sám znal. Cizinec může říct cokoliv, ale musí to být aspoň tři věty.",
    goals: [
      "Cizinec mluví nebo píše sám — ženich jen zadá téma",
      "Vzkaz musí obsahovat aspoň 3 věty o nevěstě nebo manželství",
      "Vzkaz skutečně odeslán nevěstě ihned po natočení",
    ],
    reward: "Ženich vybírá fotografii z dne, kterou pošle nevěstě.",
    penalty: "Parta vybírá jednu fotografii ze dne, kterou pošlou nevěstě.",
  },
  {
    num: 6, title: "Námořní legenda", diff: "střední",
    desc: "U přístavu musí ženich zastavit kohokoliv kdo vypadá jako místní a zeptat se na legendu nebo příběh spojený s Dubrovníkem — jako by dělal reportáž. Musí aktivně poslouchat aspoň 2 minuty.",
    goals: [
      "Dotyčný musí mluvit aspoň 2 minuty v kuse",
      "Ženich nesmí přerušit ani odbočit jinam",
      "Po skončení shrne příběh partě vlastními slovy — parta hlasuje o věrnosti",
    ],
    reward: "Titul Kapitán přístavu — může jednou kdykoliv zrušit nebo změnit libovolný plán skupiny bez hlasování.",
    penalty: "Musí si sednout k náhodnému obsazenému stolu s cizími lidmi a přednést vlastní vymyšlenou legendu o Dubrovníku — minimálně 60 sekund. Parta sleduje z bezpečné vzdálenosti.",
  },
  {
    num: 7, title: "Rybář z přístavu", diff: "těžký",
    desc: "U přístavu musí ženich najít místního prodejce nebo rybáře a koupit od něj jednu rybičku nebo mořský plod — za nejlepší vyjednanou cenu. Parta hlasuje jestli byl obchod výhodný.",
    goals: [
      "Skutečná transakce — jen povídání nestačí",
      "Musí zkusit smlouvat — aspoň jeden protiargument prodejci",
      "Koupenou věc sní na místě (pokud je to bezpečné)",
    ],
    reward: "Zbytek party za něj platí večeři/oběd.",
    penalty: "Večeři si platí sám.",
  },
  {
    num: 8, title: "Básník z nábřeží", diff: "těžký",
    desc: "Ženich dostane 10 minut napsat čtyřřádkovou báseň o nevěstě — na místě, bez pomoci telefonu. Pak ji musí přečíst nahlas celé partě. Parta hlasuje o kvalitě.",
    goals: [
      "Aspoň 4 řádky, téma musí být nevěsta nebo vztah",
      "Přečteno nahlas před celou partou — ne potichu pro sebe",
      "Pokud parta uzná za vhodné, báseň se ihned odesílá nevěstě",
    ],
    reward: "Titul Básník rozlučky na zbytek dne + ženich vybírá fotografii, kterou pošle nevěstě.",
    penalty: "Odmítne-li číst nahlas — sežene dočasnou tetovačku (ze žvýkačky, suvenýrů...) a natetuje si ji viditelně na obličej. Nosí ji celý zbytek dne.",
  },
  {
    num: 9, title: "Vzkaz nevěstě", diff: "těžký",
    desc: "Ženich musí natočit 30sekundové video pro nevěstu. Musí být jasně poznat, že je v Chorvatsku — bez toho aby to říkal (moře, hradby, střechy starého města v záběru). Video musí obsahovat vyznání lásky a jednu konkrétní společnou vzpomínku.",
    goals: [
      "Video natočené živě před celou partou — žádné střihy ani opakování",
      "Chorvatsko musí být v záběru bez komentáře — parta rozhoduje",
      "Zmínit konkrétní vzpomínku, ne jen obecné fráze",
    ],
    reward: "Titul Dubrovnický Romantik — celý zbytek dne neplatí absolutně nic, vše hradí parta.",
    penalty: "Odmítne-li natočit — platí partě rundu a parta vybírá fotografii, kterou pošlou nevěstě.",
  },
  {
    num: 10, title: "Sucking Fucking, no problem", diff: "final",
    desc: "Inspirováno Budapeští. Ženich musí najít pouliční prodejce nebo stánkaře a navázat přátelský rozhovor aspoň na 120 sekund — o životě, počasí, rodině. Teprve pak začne smlouvat cenu libovolného zboží. Musí vyjednat aspoň 20% slevu. Zboží pak skutečně koupí — musí to být něco trvalého jako vzpomínka na rozlučku (soška, magnetka, krýgl, přívěsek apod.).",
    goals: [
      "Nejdřív přátelský rozhovor — žádné smlouvání prvních 120 sekund",
      "Aspoň 3 pokusy o vyjednání slevy — nestačí se zeptat jednou",
      "Dosáhne-li 20% slevy, quest splněn. Nedosáhne-li, zboží přesto koupí za plnou cenu",
    ],
    reward: "Legenda rozlučky — titul Dubrovnický Vyjednávač + vybere libovolné fotografie, které se pošlou nevěstě.",
    penalty: "Koupí daný předmět každému z party + každý vybere jednu fotografii z celé rozlučky a pošlou se nevěstě.",
  },
];

const DIFF_CLASS = { "snadný": "easy", "střední": "medium", "těžký": "hard", "final": "final" };
const DIFF_LABEL = { "snadný": "◆ Snadný", "střední": "◆ Střední", "těžký": "◆ Těžký", "final": "⚔ Final" };

let current = 0;
let state = {};

function loadState() {
  try { const s = localStorage.getItem('dubrovnik_questy_v2'); if (s) state = JSON.parse(s); } catch(e) {}
  QUESTS.forEach((q, i) => { if (!state[i]) state[i] = { result: null, goals: [false, false, false] }; });
}

function saveState() {
  try { localStorage.setItem('dubrovnik_questy_v2', JSON.stringify(state)); } catch(e) {}
}

function buildSlides() {
  const slider = document.getElementById('slider');
  slider.innerHTML = '';
  QUESTS.forEach((q, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.innerHTML = slideHTML(q, i);
    slider.appendChild(slide);
  });
  bindGoals();
  bindResults();
}

function slideHTML(q, i) {
  const s = state[i];
  const diffClass = DIFF_CLASS[q.diff];
  const isFinal = q.diff === 'final';
  const goalsHTML = q.goals.map((g, gi) => `
    <li class="goal-item${s.goals[gi] ? ' checked' : ''}" data-quest="${i}" data-goal="${gi}">
      <span class="goal-check"></span>
      <span class="goal-text">${g}</span>
    </li>`).join('');

  return `
    <div class="quest-num">${isFinal ? '⚔ Final Quest' : `Sidequest ${q.num}`} · Rozlučka Dubrovník</div>
    <div class="quest-header">
      <div class="quest-title">${q.title}</div>
      <span class="diff-badge diff-${diffClass}">${DIFF_LABEL[q.diff]}</span>
    </div>
    <div class="result-row">
      <button class="result-btn${s.result === 'done' ? ' active-done' : ''}" data-quest="${i}" data-result="done">✓ Splněno</button>
      <button class="result-btn${s.result === 'fail' ? ' active-fail' : ''}" data-quest="${i}" data-result="fail">✗ Nesplněno</button>
    </div>
    <div class="sect-label">Popis úkolu</div>
    <p class="quest-desc">${q.desc}</p>
    <div class="sect-label">Cíle</div>
    <ul class="goals-list">${goalsHTML}</ul>
    <div class="sect-label">Odměna &amp; trest</div>
    <div class="rp-grid">
      <div class="rp-box reward"><div class="rp-label">🏆 Odměna</div><div class="rp-text">${q.reward}</div></div>
      <div class="rp-box penalty"><div class="rp-label">💀 Trest</div><div class="rp-text">${q.penalty}</div></div>
    </div>`;
}

function bindGoals() {
  document.querySelectorAll('.goal-item').forEach(el => {
    el.addEventListener('click', () => {
      const qi = +el.dataset.quest, gi = +el.dataset.goal;
      state[qi].goals[gi] = !state[qi].goals[gi];
      el.classList.toggle('checked', state[qi].goals[gi]);
      saveState(); updateDots();
    });
  });
}

function bindResults() {
  document.querySelectorAll('.result-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = +btn.dataset.quest, val = btn.dataset.result;
      if (state[qi].result === val) {
        state[qi].result = null;
        btn.classList.remove('active-done', 'active-fail');
      } else {
        state[qi].result = val;
        document.querySelectorAll(`.result-btn[data-quest="${qi}"]`).forEach(b => b.classList.remove('active-done','active-fail'));
        btn.classList.add(val === 'done' ? 'active-done' : 'active-fail');
      }
      saveState(); updateDots();
    });
  });
}

function buildDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  QUESTS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', () => goTo(i));
    container.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot';
    if (i === current) d.classList.add('active');
    else if (state[i]?.result === 'done') d.classList.add('done');
    else if (state[i]?.result === 'fail') d.classList.add('failed');
  });
  document.getElementById('counter').textContent = `${current + 1} / ${QUESTS.length}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === QUESTS.length - 1;
}

function goTo(idx, animate = true) {
  current = Math.max(0, Math.min(QUESTS.length - 1, idx));
  const slider = document.getElementById('slider');
  if (!animate) slider.style.transition = 'none';
  slider.style.transform = `translateX(-${current * 100}%)`;
  if (!animate) requestAnimationFrame(() => { slider.style.transition = ''; });
  updateDots();
}

let touchStartX = 0, touchStartY = 0, dragging = false, startTranslate = 0;
const sliderWrap = document.getElementById('slider-wrap');

sliderWrap.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
  dragging = true; startTranslate = -current * sliderWrap.offsetWidth;
  document.getElementById('slider').style.transition = 'none';
}, { passive: true });

sliderWrap.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dx = e.touches[0].clientX - touchStartX, dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) { dragging = false; return; }
  document.getElementById('slider').style.transform = `translateX(${startTranslate + dx}px)`;
}, { passive: true });

sliderWrap.addEventListener('touchend', e => {
  if (!dragging) return; dragging = false;
  document.getElementById('slider').style.transition = '';
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -50 && current < QUESTS.length - 1) goTo(current + 1);
  else if (dx > 50 && current > 0) goTo(current - 1);
  else goTo(current);
});

document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight') goTo(current+1); if (e.key === 'ArrowLeft') goTo(current-1); });
setTimeout(() => document.getElementById('hint').classList.add('hidden'), 2800);

loadState(); buildSlides(); buildDots(); goTo(0, false);
</script>
</body>
